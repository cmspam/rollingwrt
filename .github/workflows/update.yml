name: update

# Keep sources current on our own cadence (not daily): resolve the latest
# upstream version of each feed package and, optionally, the latest OpenWrt
# snapshot commit, commit the diff, and dispatch a build. Nothing is pulled from
# a frozen copy - incus comes from lxc/incus releases, incus-ui from the Zabbly
# stable Packages index, zfs from openzfs, cowsql from GitHub.

on:
  workflow_dispatch:
    inputs:
      bump_pin:
        description: "Also move config/SNAPSHOT_PIN to the latest snapshot"
        type: boolean
        default: false
  schedule:
    - cron: "0 6 * * 1"   # weekly, Monday 06:00 UTC

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump feed package versions to upstream latest
        id: bump
        run: |
          changes="$(bash scripts/bump.sh || true)"
          printf '%s\n' "$changes"
          { echo 'changes<<EOF'; printf '%s\n' "$changes"; echo EOF; } >> "$GITHUB_OUTPUT"

      - name: Move the snapshot pin (opt-in)
        id: pin
        if: ${{ inputs.bump_pin }}
        run: |
          new="$(sh scripts/latest-snapshot.sh)"
          old="$(cat config/SNAPSHOT_PIN)"
          if [ "$new" != "$old" ]; then echo "$new" > config/SNAPSHOT_PIN; echo "pin $old -> $new"; fi

      - name: Commit
        run: |
          if ! git diff --quiet; then
            git config user.name cmspam
            git config user.email '${{ secrets.GIT_EMAIL }}'
            git commit -am "update: ${{ steps.bump.outputs.changes }}"
            git push
          else
            echo "no changes"
          fi

      - name: Dispatch a build if anything changed
        if: ${{ steps.bump.outputs.changes != '' || inputs.bump_pin }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'build.yml', ref: context.ref,
            })
